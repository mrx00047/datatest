{% extends "base.html" %}
{% block content %}

<div class="card search-card">
  <h2>بحث سريع</h2>
  <p class="muted">ابحث بالكود أو اسم الصنف فقط</p>

  <form class="form" method="get" action="{{ url_for('index') }}">
    <div class="field">
      <label>البحث</label>
      <input name="q" value="{{ q }}" placeholder="مثال: EO7010 أو Compressor">
    </div>

    <div class="row-actions">
      <button class="btn primary" type="submit">بحث</button>
      <a class="btn" href="{{ url_for('filter_page') }}">مسح</a>
      <a class="btn" href="{{ url_for('index') }}">رجوع</a>
    </div>
  </form>
</div>

{% endblock %}
